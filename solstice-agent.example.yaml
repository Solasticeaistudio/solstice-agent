# Solstice Agent Configuration
# ============================
# Copy this to solstice-agent.yaml and customize.
# Env vars override these values (OPENAI_API_KEY, ANTHROPIC_API_KEY, etc.)

# --- LLM Provider ---
# Options: openai, anthropic, gemini, ollama
provider: openai
model: gpt-4o
api_key: ""  # Or set OPENAI_API_KEY env var

# For Anthropic:
# provider: anthropic
# model: claude-sonnet-4-5-20250929
# api_key: ""  # Or set ANTHROPIC_API_KEY env var

# For Gemini:
# provider: gemini
# model: gemini-2.5-flash
# api_key: ""  # Or set GEMINI_API_KEY env var

# For local models (Ollama — no key needed):
# provider: ollama
# model: llama3.1
# ollama_base_url: http://localhost:11434

# For OpenAI-compatible APIs (LMStudio, Together, etc.):
# provider: openai
# model: your-model-name
# base_url: http://localhost:1234/v1

# --- Agent ---
personality_name: default  # default or coder
temperature: 0.7
max_tokens: 4096

# --- Runtime Profile ---
# Options: local_safe, developer, gateway, power_user
# local_safe: local tools with conservative defaults
# developer: browser/blackbox/docker enabled for local coding workflows
# gateway: safe remote/message-facing defaults
# power_user: broad capability surface, including opt-in tools
runtime_profile: local_safe

# --- Tools ---
# These are optional overrides on top of the runtime profile.
# Uncomment only when you need to diverge from the selected profile.
# enable_terminal: true
# enable_web: true
# enable_browser: false
# enable_blackbox: false
# enable_screen: false
# enable_docker: false
# enable_outreach: false
# enable_registry: true

# --- Gateway (messaging channels) ---
# gateway_enabled: false
# workspace_root: /absolute/path/to/workspace
# gateway_channels:
#   telegram:
#     enabled: true
#     bot_token: "your-telegram-bot-token"
#   discord:
#     enabled: true
#     bot_token: "your-discord-bot-token"
#     channel_ids: "123456789"
#   slack:
#     enabled: true
#     bot_token: "xoxb-your-slack-token"
#     signing_secret: "your-signing-secret"
